<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

</head>

<body>
    <header>
        <h1>Blog das gatinhas </h1>
        <p>Vou compartilhar fake news </p>
        <style>
            header {
                background-color: #7eb9fc;
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
            }

            main {
                background-color: #FFFFFF;
                color: #061852;

            }

            article {
                display: flex;
            }

            img {
                width: 160px;
                height: 150px;
            }

            .artigo-autor {
                font-weight: bold;
            }
        </style>
    </header>

    <main>
        <article>
            <img src="rafa.avif"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Meu primeiro post</h2>
                <p class="artigo-autor">Por: as gatinhas </p>
                <p>Peter Parker cria uma invensão para voltar no tempo e volta para a Gwen </p>
                <button>❤️<span>1000</span></button>
                <button>👍<span>60000</span></button>
            </div>
        </article>
        <article>
            <img src="imagem-blog.png"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Meu segundo post</h2>
                <p class="artigo-autor">Por: as gatinhas</p>
                <p>Olá gente o Brasil derrota Portugal de 2 x 10, e os ET se juntao ao time do brasil. e farmam aura </p>
                <button>❤️<span>100000</span></button>
                <button>👍<span>200000</span></button>
            </div>
        </article>

    </main>
</body>

<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);
        function botaoClicado() {
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    });



</script>

</html>
